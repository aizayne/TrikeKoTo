name: trikekoto
description: "TrikeKoTo — tricycle ride-hailing for Barangay Balaybay Resettlement."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.0.3

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Maps (OpenStreetMap, free, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location + screen
  geolocator: ^14.0.2
  wakelock_plus: ^1.2.10

  # Misc
  intl: ^0.20.1
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Branding asset generators — only used at build time. Re-run with:
  #   dart run flutter_launcher_icons
  #   dart run flutter_native_splash:create
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

# ── Launcher icons ────────────────────────────────────────────────────────────
# Source images live in assets/branding/. The generator writes the platform
# folders under android/app/src/main/res/. Re-run after editing icon.png.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false                      # iOS not in scope for v1
  image_path: "assets/branding/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/branding/icon_foreground.png"
  remove_alpha_ios: true

# ── Native splash ─────────────────────────────────────────────────────────────
# Renders before the Flutter engine boots, so the user sees the brand mark
# instead of a white flash. Android 12+ uses the native SplashScreen API.
flutter_native_splash:
  color: "#080D1A"                 # NAVY_DEEP — slightly darker than scaffold
  image: "assets/branding/splash.png"
  branding: "assets/branding/splash_branding.png"
  branding_mode: bottom
  android_12:
    color: "#080D1A"
    image: "assets/branding/icon_foreground.png"
    icon_background_color: "#0F172A"
  android: true
  ios: false
  web: false
