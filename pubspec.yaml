name: trikekoto
description: "TrikeKoTo — tricycle ride-hailing for Barangay Balaybay Resettlement."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.0.3

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Maps (OpenStreetMap, free, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Location + screen
  geolocator: ^14.0.2
  wakelock_plus: ^1.2.10

  # Misc
  intl: ^0.20.1
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
